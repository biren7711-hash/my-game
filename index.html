<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>🎮 Game Đoán Số</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>🎮 Game Đoán Số</h1>
        <p>Đoán số từ 1 đến 10</p>
        <label>Độ khó:</label>
<select id="difficulty" onchange="changeDifficulty()">
    <option value="10">Dễ (1–10)</option>
    <option value="50">Trung bình (1–50)</option>
    <option value="100">Khó (1–100)</option>
</select>

        <p id="score">🏆 Điểm: 0</p>
        <p id="lives">❤️ Mạng còn lại: 3</p>

        <input type="number" id="guess" min="1" max="10">
        <button onclick="checkGuess()">Đoán</button>
        <button onclick="resetGame()">Chơi lại</button>

        <p id="result"></p>
    </div>

    <script src="script.js"></script>

</body>
</html>
